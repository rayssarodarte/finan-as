<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cofrinhos</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#020617;
      color:white;
      display:flex;
    }

    .menu{
      width:240px;
      min-height:100vh;
      background:#0f172a;
      padding:25px;
      position:fixed;
    }

    .logo{
      margin-bottom:40px;
    }

    .logo p{
      color:#94a3b8;
      margin-top:5px;
    }

    .menu nav{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .menu nav a{
      color:#94a3b8;
      text-decoration:none;
      padding:12px;
      border-radius:10px;
    }

    .menu nav a:hover,
    .menu nav .active{
      background:#1e293b;
      color:white;
    }

    .container{
      width:100%;
      margin-left:240px;
      padding:30px;
    }

    header{
      margin-bottom:30px;
    }

    header h1{
      font-size:32px;
    }

    header p{
      color:#94a3b8;
      margin-top:5px;
    }

    .box{
      background:#1e293b;
      padding:20px;
      border-radius:18px;
      margin-bottom:20px;
    }

    input,
    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#020617;
      color:white;
      margin-top:10px;
      outline:none;
    }

    button{
      background:#2563eb;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .total{
      font-size:42px;
      color:#eab308;
      margin-top:10px;
    }

    .cardsCofrinhos{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-top:15px;
    }

    .cofrinhoCard{
      background:#020617;
      padding:18px;
      border-radius:16px;
      border-left:5px solid #eab308;
    }

    .cofrinhoCard h3{
      margin-bottom:10px;
    }

    .cofrinhoCard p{
      color:#cbd5e1;
      margin-bottom:10px;
    }

    .valor{
      font-size:26px;
      color:#eab308;
      font-weight:bold;
    }

    .btnExcluir{
      background:#ef4444;
    }

    .aviso{
      color:#94a3b8;
      margin-top:10px;
    }

    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .menu{
        position:relative;
        width:100%;
        min-height:auto;
      }

      .container{
        margin-left:0;
      }

      .cardsCofrinhos{
        grid-template-columns:1fr;
      }

    }
  </style>
</head>

<body>

  <!-- MENU -->
  <aside class="menu">

    <div class="logo">
      <h2>💵 Meu Dinheiro</h2>
      <p>Controle financeiro</p>
    </div>

    <nav>
      <a href="index.html">Resumo</a>
      <a href="ganhos.html">Ganhos</a>
      <a href="gastos.html">Gastos</a>
      <a href="fixos.html">Fixos</a>
      <a href="cofrinhos.html" class="active">Cofrinhos</a>
      <a href="metas.html">Metas</a>
    </nav>

  </aside>

  <!-- CONTEÚDO -->
  <main class="container">

    <header>
      <h1>Cofrinhos</h1>
      <p>Crie reservas separadas para seus objetivos</p>
    </header>

   

    <!-- TOTAL -->
    <section class="box">

      <h2>Total guardado</h2>

      <h1 class="total" id="totalCofrinhos">
        R$ 0,00
      </h1>

    </section>

    <!-- PESQUISA -->
    <section class="box">

      <h2>Pesquisar cofrinho</h2>

      <input
        type="text"
        id="pesquisaCofrinho"
        placeholder="Ex: viagem..."
        oninput="atualizarTelaCofrinhos()"
      >

    </section>

    <!-- LISTA -->
    <section class="box">

      <h2>Meus cofrinhos</h2>

      <div
        id="listaCofrinhos"
        class="cardsCofrinhos"
      ></div>

    </section>

  </main>

  <script>

    // PEGAR COFRINHOS SALVOS
    let cofrinhos =
    JSON.parse(localStorage.getItem("cofrinhos")) || [];

    // FORMATAR DINHEIRO
    function formatar(valor){

      return Number(valor).toLocaleString("pt-BR",{
        style:"currency",
        currency:"BRL"
      });

    }

    // SALVAR DADOS
    function salvarDados(){

      localStorage.setItem(
        "cofrinhos",
        JSON.stringify(cofrinhos)
      );

    }

    // ADICIONAR COFRINHO
    function adicionarCofrinho(){

      const nome =
      document.getElementById("nomeCofrinho").value;

      const valor =
      Number(document.getElementById("valorCofrinho").value);

      if(nome === "" || valor <= 0){
        return;
      }

      cofrinhos.push({
        nome,
        valor:Number(valor)
      });

      document.getElementById("nomeCofrinho").value = "";
      document.getElementById("valorCofrinho").value = "";

      salvarDados();

      atualizarTelaCofrinhos();

    }

    // ATUALIZAR TELA
    function atualizarTelaCofrinhos(){

      const pesquisa =
      document.getElementById("pesquisaCofrinho")
      .value
      .toLowerCase();

      // FILTRAR COFRINHOS
      const cofrinhosFiltrados =
      cofrinhos.filter(item => {

        return item.nome
        .toLowerCase()
        .includes(pesquisa);

      });

      // SOMAR TOTAL
      const total =
      cofrinhos.reduce(
        (soma,item) => soma + Number(item.valor),
        0
      );

      // MOSTRAR TOTAL
      document.getElementById("totalCofrinhos")
      .textContent = formatar(total);

      // PEGAR LISTA
      const lista =
      document.getElementById("listaCofrinhos");

      // LIMPAR LISTA
      lista.innerHTML = "";

      // VERIFICAR SE EXISTE COFRINHO
      if(cofrinhosFiltrados.length === 0){

        lista.innerHTML =
        "<p class='aviso'>Nenhum cofrinho encontrado.</p>";

        return;

      }

      // MOSTRAR COFRINHOS
      cofrinhosFiltrados.forEach(item => {

        // PEGAR INDEX REAL
        const indexReal =
        cofrinhos.indexOf(item);

        // ADICIONAR ITEM NA LISTA
        lista.innerHTML += `
          <div class="cofrinhoCard">

            <h3>🟡 ${item.nome}</h3>

            <p>Valor guardado</p>

            <div class="valor">
              ${formatar(item.valor)}
            </div>

            <button
              class="btnExcluir"
              onclick="excluirCofrinho(${indexReal})"
            >
              Excluir
            </button>

          </div>
        `;

      });

    }

    // EXCLUIR COFRINHO
    function excluirCofrinho(index){

      // REMOVER COFRINHO
      cofrinhos.splice(index,1);

      // SALVAR DADOS
      salvarDados();

      // ATUALIZAR TELA
      atualizarTelaCofrinhos();

    }

    // INICIAR
    atualizarTelaCofrinhos();

  </script>

</body>
</html>
