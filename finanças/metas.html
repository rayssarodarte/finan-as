<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Metas</title>

  <style>

    /* RESET GERAL */
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    /* FUNDO DO SITE */
    body{
      background:#020617;
      color:white;
      display:flex;
    }

    /* MENU LATERAL */
    .menu{
      width:240px;
      min-height:100vh;
      background:#0f172a;
      padding:25px;
      position:fixed;
    }

    /* LOGO */
    .logo{
      margin-bottom:40px;
    }

    /* TEXTO DA LOGO */
    .logo p{
      color:#94a3b8;
      margin-top:5px;
    }

    /* MENU */
    .menu nav{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    /* LINKS MENU */
    .menu nav a{
      color:#94a3b8;
      text-decoration:none;
      padding:12px;
      border-radius:10px;
    }

    /* HOVER MENU */
    .menu nav a:hover,
    .menu nav .active{
      background:#1e293b;
      color:white;
    }

    /* CONTEÚDO PRINCIPAL */
    .container{
      width:100%;
      margin-left:240px;
      padding:30px;
    }

    /* TOPO */
    header{
      margin-bottom:30px;
    }

    /* TÍTULO */
    header h1{
      font-size:32px;
    }

    /* SUBTÍTULO */
    header p{
      color:#94a3b8;
      margin-top:5px;
    }

    /* BOX */
    .box{
      background:#1e293b;
      padding:20px;
      border-radius:18px;
      margin-bottom:20px;
    }

    /* INPUTS */
    input,
    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#020617;
      color:white;
      margin-top:10px;
      outline:none;
    }

    /* BOTÕES */
    button{
      background:#2563eb;
      font-weight:bold;
      cursor:pointer;
    }

    /* HOVER BOTÕES */
    button:hover{
      opacity:0.9;
    }

    /* TOTAL */
    .total{
      font-size:42px;
      color:#22c55e;
      margin-top:10px;
    }

    /* CARDS METAS */
    .cardsMetas{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-top:15px;
    }

    /* CARD META */
    .metaCard{
      background:#020617;
      padding:18px;
      border-radius:16px;
      border-left:5px solid #22c55e;
    }

    /* TÍTULO CARD */
    .metaCard h3{
      margin-bottom:10px;
    }

    /* TEXTO CARD */
    .metaCard p{
      color:#cbd5e1;
      margin-bottom:10px;
    }

    /* BARRA */
    .barra{
      width:100%;
      height:10px;
      background:#334155;
      border-radius:20px;
      overflow:hidden;
      margin:12px 0;
    }

    /* PROGRESSO */
    .progresso{
      height:10px;
      background:#22c55e;
      border-radius:20px;
    }

    /* BOTÃO EXCLUIR */
    .btnExcluir{
      background:#ef4444;
    }

    /* AVISO */
    .aviso{
      color:#94a3b8;
      margin-top:10px;
    }

    /* RESPONSIVIDADE */
    @media(max-width:900px){

      body{
        flex-direction:column;
      }

      .menu{
        position:relative;
        width:100%;
        min-height:auto;
      }

      .container{
        margin-left:0;
      }

      .cardsMetas{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

  <!-- MENU -->
  <aside class="menu">

    <div class="logo">
      <h2>💵 Meu Dinheiro</h2>
      <p>Controle financeiro</p>
    </div>

    <nav>
      <a href="index.html">Resumo</a>
      <a href="ganhos.html">Ganhos</a>
      <a href="gastos.html">Gastos</a>
      <a href="fixos.html">Fixos</a>
      <a href="cofrinhos.html">Cofrinhos</a>
      <a href="metas.html" class="active">Metas</a>
    </nav>

  </aside>

  <!-- CONTEÚDO -->
  <main class="container">

    <header>
      <h1>Metas</h1>
      <p>Acompanhe seus objetivos financeiros</p>
    </header>


    <!-- TOTAL -->
    <section class="box">

      <h2>Total guardado em metas</h2>

      <h1 class="total" id="totalMetas">
        R$ 0,00
      </h1>

    </section>

    <!-- PESQUISA -->
    <section class="box">

      <h2>Pesquisar meta</h2>

      <input
        type="text"
        id="pesquisaMeta"
        placeholder="Ex: notebook..."
        oninput="atualizarTelaMetas()"
      >

    </section>

    <!-- LISTA -->
    <section class="box">

      <h2>Minhas metas</h2>

      <div
        id="listaMetas"
        class="cardsMetas"
      ></div>

    </section>

  </main>

  <script>

    // PEGAR METAS SALVAS
    let metas =
    JSON.parse(localStorage.getItem("metas")) || [];

    // FORMATAR DINHEIRO
    function formatar(valor){

      return Number(valor).toLocaleString("pt-BR",{
        style:"currency",
        currency:"BRL"
      });

    }

    // SALVAR DADOS
    function salvarDados(){

      localStorage.setItem(
        "metas",
        JSON.stringify(metas)
      );

    }

    // ADICIONAR META
    function adicionarMeta(){

      const nome =
      document.getElementById("nomeMeta").value;

      const valorTotal =
      Number(document.getElementById("valorMeta").value);

      const valorGuardado =
      Number(document.getElementById("valorGuardadoMeta").value);

      if(nome === "" || valorTotal <= 0){
        return;
      }

      metas.push({
        nome,
        valorTotal:Number(valorTotal),
        valorGuardado:Number(valorGuardado)
      });

      document.getElementById("nomeMeta").value = "";
      document.getElementById("valorMeta").value = "";
      document.getElementById("valorGuardadoMeta").value = "";

      salvarDados();

      atualizarTelaMetas();

    }

    // ATUALIZAR TELA
    function atualizarTelaMetas(){

      const pesquisa =
      document.getElementById("pesquisaMeta")
      .value
      .toLowerCase();

      // FILTRAR METAS
      const metasFiltradas =
      metas.filter(item => {

        return item.nome
        .toLowerCase()
        .includes(pesquisa);

      });

      // SOMAR TOTAL GUARDADO
      const total =
      metas.reduce(
        (soma,item) => soma + Number(item.valorGuardado),
        0
      );

      // MOSTRAR TOTAL
      document.getElementById("totalMetas")
      .textContent = formatar(total);

      // PEGAR LISTA
      const lista =
      document.getElementById("listaMetas");

      // LIMPAR LISTA
      lista.innerHTML = "";

      // VERIFICAR SE EXISTE META
      if(metasFiltradas.length === 0){

        lista.innerHTML =
        "<p class='aviso'>Nenhuma meta encontrada.</p>";

        return;

      }

      // MOSTRAR METAS
      metasFiltradas.forEach(item => {

        // PEGAR INDEX REAL
        const indexReal =
        metas.indexOf(item);

        // CALCULAR PORCENTAGEM
        let porcentagem =
        (Number(item.valorGuardado) / Number(item.valorTotal)) * 100;

        if(porcentagem > 100){
          porcentagem = 100;
        }

        // CALCULAR VALOR FALTANTE
        const faltante =
        Number(item.valorTotal) - Number(item.valorGuardado);

        // ADICIONAR ITEM NA LISTA
        lista.innerHTML += `
          <div class="metaCard">

            <h3>🎯 ${item.nome}</h3>

            <p>
              Guardado:
              ${formatar(item.valorGuardado)}
            </p>

            <p>
              Meta:
              ${formatar(item.valorTotal)}
            </p>

            <div class="barra">
              <div
                class="progresso"
                style="width:${porcentagem}%"
              ></div>
            </div>

            <p>
              ${porcentagem.toFixed(0)}% concluído
            </p>

            <p>
              Falta:
              ${formatar(faltante < 0 ? 0 : faltante)}
            </p>

            <button
              class="btnExcluir"
              onclick="excluirMeta(${indexReal})"
            >
              Excluir
            </button>

          </div>
        `;

      });

    }

    // EXCLUIR META
    function excluirMeta(index){

      // REMOVER META
      metas.splice(index,1);

      // SALVAR DADOS
      salvarDados();

      // ATUALIZAR TELA
      atualizarTelaMetas();

    }

    // INICIAR
    atualizarTelaMetas();

  </script>

</body>
</html>
